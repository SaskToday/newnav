<script>
(() => {
    const COMMIT_HASH = '0295a4b';
    const PRIMARY_URL = 'https://cdn.jsdelivr.net/gh/sasktoday/newnav@' + COMMIT_HASH + '/new_nav.js?v=' + COMMIT_HASH;
    const FALLBACK_URL = 'https://sasktoday.github.io/newnav/new_nav.js?v=' + COMMIT_HASH;
    const PRIMARY_SRI = 'sha384-zQlPEFDSaIY4W+1eFnTWbyqYe32GOvJVPaPcaGcwe1I5cEWSsilx5N1tcAHrOhfK';

    function appendScript(src, integrity, onerror) {
        const script = document.createElement('script');
        script.src = src;
        if (integrity) script.integrity = integrity;
        script.crossOrigin = 'anonymous';
        script.defer = true;
        if (onerror) script.onerror = onerror;
        document.head.appendChild(script);
    }

    function trackFallbackUsed() {
        if (window.posthog && typeof window.posthog.capture === 'function') {
            window.posthog.capture('nav_loader_fallback_used', {
                primary_url: PRIMARY_URL,
                fallback_url: FALLBACK_URL,
                commit_hash: COMMIT_HASH,
                primary_provider: 'jsdelivr',
                fallback_provider: 'github_pages'
            });
        }
    }

    appendScript(PRIMARY_URL, PRIMARY_SRI, () => {
        trackFallbackUsed();
        appendScript(FALLBACK_URL, '');
    });
})();
</script>
