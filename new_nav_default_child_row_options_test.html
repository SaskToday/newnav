<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nav Default Row Toggle Test</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #111;
      }
      header {
        border-bottom: 1px solid #e5e7eb;
        background: #fff;
      }
      .page-shell {
        max-width: 990px;
        margin: 0 auto;
        padding: 16px 10px;
      }
      main {
        padding: 20px 0 80px;
      }
      .tip-toggle-panel {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 1000002;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid #d1d5db;
        border-radius: 10px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        padding: 8px;
        width: 250px;
      }
      .tip-toggle-panel .title {
        font-size: 12px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .tip-toggle-panel .btns {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
      .tip-toggle-panel button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .tip-toggle-panel button.active {
        background: #0f172a;
        color: #fff;
        border-color: #0f172a;
      }
      .tip-toggle-panel .meta {
        font-size: 11px;
        line-height: 1.3;
        color: #4b5563;
      }

      /* Only style the default/no-active child row variant */
      #category-default.tip-option-1 .bottom-row-inner {
        background: #eff6ff;
      }
      #category-default.tip-option-2 .bottom-row-inner {
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
        border-bottom: 1px solid #e2e8f0;
      }
      #category-default.tip-option-3 .bottom-row-inner {
        background: #111827;
      }
      #category-default .community-tip-intro {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
        color: #1f2937;
        white-space: nowrap;
        margin-right: 8px;
      }
      #category-default.tip-option-3 .community-tip-intro {
        color: #f9fafb;
      }
      #category-default .community-tip-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #2563eb;
        display: inline-block;
        flex: 0 0 10px;
      }
      #category-default.tip-option-3 .community-tip-dot {
        background: #93c5fd;
      }
      #category-default.tip-option-2 .community-tip-link {
        border: 1px solid #d1d5db;
        border-radius: 999px;
        padding: 4px 9px;
        background: #fff;
      }
      #category-default.tip-option-3 .community-tip-link {
        color: #f9fafb;
        border-bottom: 1px solid rgba(255, 255, 255, 0.35);
        padding-bottom: 1px;
      }
      #category-default .community-tip-intro.has-arrow {
        gap: 4px;
      }
      #category-default .community-tip-arrow {
        width: 52px;
        height: 24px;
        flex: 0 0 52px;
        overflow: visible;
        margin-right: 1px;
      }
      #category-default.tip-option-4 {
        display: none !important;
      }
      .community-pill-overlay {
        position: fixed;
        z-index: 1000003;
        background: #111827;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        border-radius: 8px;
        padding: 8px 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        pointer-events: auto;
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.18s ease, transform 0.18s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .community-pill-overlay.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .community-pill-overlay::before {
        content: "";
        position: absolute;
        top: -6px;
        left: 16px;
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-bottom: 6px solid #111827;
      }
      .community-pill-overlay-close {
        border: 0;
        background: transparent;
        color: #fff;
        font-size: 14px;
        line-height: 1;
        padding: 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="page-shell">
        <strong>Default Child Row Toggle Test (Real Nav Script)</strong>
      </div>
    </header>

    <main class="page-shell">
      <p>Open DevTools mobile view to inspect real nav behavior with only the no-active default row changed.</p>
      <p>Use the toggle in the bottom-right to switch variants.</p>
    </main>

    <div class="tip-toggle-panel" id="tip-toggle-panel">
      <p class="title">Default Community Tip Row</p>
      <div class="btns">
        <button data-tip-option="1" class="active">Option 1</button>
        <button data-tip-option="2">Option 2</button>
        <button data-tip-option="3">Option 3</button>
        <button data-tip-option="5">Arrow</button>
        <button data-tip-option="4">Overlay</button>
      </div>
      <div class="meta" id="tip-toggle-meta">Soft strip style</div>
    </div>

    <script src="./new_nav.js"></script>
    <script>
      (function () {
        const overlayDismissKey = "vm.nav.community.overlay.dismissed.v1";
        const communityLinks = [
          { text: "Regina", url: "https://staging-www2.villagemedia.ca/regina-today" },
          { text: "Saskatoon", url: "https://staging-www2.villagemedia.ca/saskatoon-today" },
          { text: "Estevan", url: "https://staging-www2.villagemedia.ca/southeast/estevanmercury" },
          { text: "Yorkton", url: "https://staging-www2.villagemedia.ca/central/yorktonthisweek" },
          { text: "Kamsack", url: "https://staging-www2.villagemedia.ca/central/kamsacktimes" },
          { text: "The Battlefords", url: "https://staging-www2.villagemedia.ca/north/thebattlefords" },
          { text: "Canora", url: "https://staging-www2.villagemedia.ca/central/canora" },
          { text: "Preeceville", url: "https://staging-www2.villagemedia.ca/central/preeceville" }
        ];
        const optionMeta = {
          1: "Soft strip style",
          2: "Card/chip style",
          3: "High contrast style",
          5: "Default row + curved arrow cue",
          4: "No child row, overlay callout on Communities"
        };
        let currentOption = 1;

        const overlay = document.createElement("div");
        overlay.className = "community-pill-overlay";
        overlay.innerHTML = '<span>Find your community</span><button type="button" class="community-pill-overlay-close" aria-label="Dismiss community tip">×</button>';
        document.body.appendChild(overlay);
        const closeBtn = overlay.querySelector(".community-pill-overlay-close");
        if (closeBtn) {
          closeBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            try {
              localStorage.setItem(overlayDismissKey, "1");
            } catch (e) {}
            overlay.classList.remove("visible");
          });
        }

        function isOverlayDismissed() {
          try {
            return localStorage.getItem(overlayDismissKey) === "1";
          } catch (e) {
            return false;
          }
        }

        function buildDefaultRowHtml(option) {
          const intro = option === 5
            ? '<span class="community-tip-intro has-arrow"><svg class="community-tip-arrow" viewBox="0 0 52 24" aria-hidden="true"><path d="M50 20H18Q8 20 8 10V1" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 5l4-4 4 4" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Get the latest updates by community.</span>'
            : '<span class="community-tip-intro"><span class="community-tip-dot"></span>Find updates from your community:</span>';
          const links = communityLinks
            .map((link) => `<a href="${link.url}" class="text-link community-tip-link">${link.text}</a>`)
            .join("");
          return `${intro}${links}`;
        }

        function applyTipOption(option) {
          const defaultRow = document.getElementById("category-default");
          const defaultInner = document.querySelector("#category-default .bottom-row-inner");
          if (!defaultRow || !defaultInner) return;
          currentOption = option;

          defaultRow.classList.remove("tip-option-1", "tip-option-2", "tip-option-3", "tip-option-4");
          defaultRow.classList.add(`tip-option-${option}`);

          if (option === 4) {
            defaultInner.innerHTML = "";
          } else {
            // Keep this row horizontally scrollable like other mobile child rows.
            defaultInner.classList.add("hide-scrollbar");
            defaultInner.style.whiteSpace = "nowrap";
            defaultInner.innerHTML = buildDefaultRowHtml(option);
          }

          document.querySelectorAll("[data-tip-option]").forEach((btn) => {
            btn.classList.toggle("active", btn.dataset.tipOption === String(option));
          });
          const meta = document.getElementById("tip-toggle-meta");
          if (meta) meta.textContent = optionMeta[option] || "";
          updateOverlayPosition();
        }

        function updateOverlayPosition() {
          const commPill = document.getElementById("comm-container");
          if (!commPill || currentOption !== 4 || window.innerWidth > 990 || isOverlayDismissed()) {
            overlay.classList.remove("visible");
            return;
          }
          const rect = commPill.getBoundingClientRect();
          const top = rect.bottom + 10;
          const left = Math.max(8, rect.left);
          overlay.style.top = `${top}px`;
          overlay.style.left = `${left}px`;
          overlay.classList.add("visible");
        }

        function initWhenNavReady() {
          const defaultInner = document.querySelector("#category-default .bottom-row-inner");
          if (!defaultInner) {
            setTimeout(initWhenNavReady, 60);
            return;
          }
          applyTipOption(1);

          document.querySelectorAll("[data-tip-option]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const option = Number(btn.dataset.tipOption || 1);
              applyTipOption(option);
            });
          });

          window.addEventListener("resize", updateOverlayPosition, { passive: true });
          window.addEventListener("scroll", updateOverlayPosition, { passive: true });
          const topRow = document.getElementById("main-top-row");
          if (topRow) {
            topRow.addEventListener("scroll", updateOverlayPosition, { passive: true });
          }
          setInterval(updateOverlayPosition, 250);
        }

        document.addEventListener("DOMContentLoaded", initWhenNavReady);
      })();
    </script>
  </body>
</html>
